services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scribbix
      POSTGRES_USER: scribbix
      POSTGRES_PASSWORD: scribbix
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scribbix -d scribbix"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - scribbix-postgres:/var/lib/postgresql/data

volumes:
  scribbix-postgres:
